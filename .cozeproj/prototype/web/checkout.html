<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #E8B4B8;
      --color-primary-container:    #E8B4B8;
      --color-on-primary:           #0A0A0A;
      /* === 背景 / 表面 === */
      --color-background:                 #0A0A0A;
      --color-surface-container-lowest:   #0E0E0E;
      --color-surface:                    #111111;
      --color-surface-container:          #161616;
      --color-surface-container-high:     #1A1A1A;
      --color-surface-container-highest:  #222222;
      /* === 文字 === */
      --color-on-surface:           #F5F0EB;
      --color-on-surface-variant:   #8A8580;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #1A1A1A;
      --color-outline-variant:  #333333;
      /* === 圆角 === */
      --radius-sm:   0.125rem;
      --radius-md:   0.25rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.4);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.5);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.6);
      /* === 字体 === */
      --font-sans: "Inter", system-ui, sans-serif;
      --font-display: "Cormorant Garamond", serif;
    }
    .font-display { font-family: var(--font-display); }
    .text-display { font-family: var(--font-display); letter-spacing: 0.05em; }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23111111"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%238A8580" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件 -->
  <header class="fixed top-0 left-0 right-0 h-[60px] z-50 backdrop-blur-[8px] bg-background/80 border-b border-outline-variant/20">
    <div class="max-w-[1200px] mx-auto h-full flex items-center justify-between px-6">
      <a href="home.html" class="text-display text-xl tracking-[0.1em] text-on-surface no-underline">FUZZSOFA</a>
      <nav class="flex items-center gap-8">
        <a href="home.html" class="text-sm tracking-[0.1em] uppercase text-on-surface-variant hover:text-on-surface transition-colors">Home</a>
        <a href="cart.html" class="relative text-on-surface-variant hover:text-on-surface transition-colors">
          <i data-lucide="shopping-bag" class="w-5 h-5"></i>
          <span class="absolute -top-1 -right-1 bg-primary text-on-primary text-[10px] w-4 h-4 rounded-full flex items-center justify-center">2</span>
        </a>
        <a href="account.html" class="text-on-surface-variant hover:text-on-surface transition-colors">
          <i data-lucide="user" class="w-5 h-5"></i>
        </a>
      </nav>
    </div>
  </header>
  <!-- @nav:end 导航组件 -->

  <main class="max-w-[1100px] mx-auto pt-[76px] pb-16 px-6">
    <!-- @main-content:start -->

    <!-- 页面标题 -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-on-surface">Checkout</h1>
      <p class="text-sm text-on-surface-variant mt-1">请填写配送信息并确认订单</p>
    </div>

    <!-- 两栏布局 -->
    <div class="grid grid-cols-1 lg:grid-cols-[1fr_380px] gap-8">

      <!-- ========== 左栏：配送信息 ========== -->
      <div class="space-y-8">

        <!-- 收货地址表单 -->
        <section class="bg-surface rounded-lg shadow-card p-5">
          <h2 class="text-base font-semibold text-on-surface mb-4 flex items-center gap-2">
            <i data-lucide="map-pin" class="w-4 h-4 text-primary"></i>
            收货地址
          </h2>
          <div class="space-y-4">
            <!-- 姓名 + 手机号 -->
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label for="input-name" class="block text-xs font-medium text-on-surface-variant mb-1.5">姓名</label>
                <input id="input-name" type="text" placeholder="收件人姓名" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" value="张小初" />
              </div>
              <div>
                <label for="input-phone" class="block text-xs font-medium text-on-surface-variant mb-1.5">手机号</label>
                <input id="input-phone" type="tel" placeholder="收件人手机号" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" value="138****5678" />
              </div>
            </div>
            <!-- 省/市/区 级联选择 -->
            <div class="grid grid-cols-3 gap-4">
              <div>
                <label for="select-province" class="block text-xs font-medium text-on-surface-variant mb-1.5">省份</label>
                <select id="select-province" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors appearance-none cursor-pointer">
                  <option value="beijing">北京市</option>
                  <option value="shanghai">上海市</option>
                  <option value="guangdong">广东省</option>
                  <option value="zhejiang">浙江省</option>
                  <option value="jiangsu">江苏省</option>
                </select>
              </div>
              <div>
                <label for="select-city" class="block text-xs font-medium text-on-surface-variant mb-1.5">城市</label>
                <select id="select-city" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors appearance-none cursor-pointer">
                  <option value="beijing">北京市</option>
                </select>
              </div>
              <div>
                <label for="select-district" class="block text-xs font-medium text-on-surface-variant mb-1.5">区县</label>
                <select id="select-district" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors appearance-none cursor-pointer">
                  <option value="chaoyang">朝阳区</option>
                  <option value="haidian">海淀区</option>
                  <option value="dongcheng">东城区</option>
                  <option value="xicheng">西城区</option>
                </select>
              </div>
            </div>
            <!-- 详细地址 -->
            <div>
              <label for="input-address" class="block text-xs font-medium text-on-surface-variant mb-1.5">详细地址</label>
              <input id="input-address" type="text" placeholder="街道、门牌号等" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" value="望京SOHO T3 1206室" />
            </div>
            <!-- 邮编 -->
            <div class="w-1/3">
              <label for="input-zipcode" class="block text-xs font-medium text-on-surface-variant mb-1.5">邮编</label>
              <input id="input-zipcode" type="text" placeholder="邮政编码" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" value="100102" />
            </div>
          </div>
        </section>

        <!-- 配送方式选择 -->
        <section class="bg-surface rounded-lg shadow-card p-5">
          <h2 class="text-base font-semibold text-on-surface mb-4 flex items-center gap-2">
            <i data-lucide="truck" class="w-4 h-4 text-primary"></i>
            配送方式
          </h2>
          <div class="space-y-3">
            <!-- 配送方式-标准配送 -->
            <label id="shipping-standard" class="flex items-center gap-3 p-3 rounded-md bg-surface-container cursor-pointer border-2 border-primary transition-colors">
              <input type="radio" name="shipping" value="standard" checked class="accent-primary w-4 h-4" />
              <div class="flex-1">
                <span class="text-sm font-medium text-on-surface">标准配送</span>
                <span class="text-xs text-on-surface-variant ml-2">7-15 个工作日</span>
              </div>
              <span class="text-sm font-medium text-success">免费</span>
            </label>
            <!-- 配送方式-加急配送 -->
            <label id="shipping-express" class="flex items-center gap-3 p-3 rounded-md bg-surface-container cursor-pointer border-2 border-transparent hover:border-outline-variant/20 transition-colors">
              <input type="radio" name="shipping" value="express" class="accent-primary w-4 h-4" />
              <div class="flex-1">
                <span class="text-sm font-medium text-on-surface">加急配送</span>
                <span class="text-xs text-on-surface-variant ml-2">3-5 个工作日</span>
              </div>
              <span class="text-sm font-medium text-on-surface">¥200</span>
            </label>
          </div>
        </section>

        <!-- 付款方式 -->
        <section class="bg-surface rounded-lg shadow-card p-5">
          <h2 class="text-base font-semibold text-on-surface mb-4 flex items-center gap-2">
            <i data-lucide="credit-card" class="w-4 h-4 text-primary"></i>
            付款方式
          </h2>
          <div class="space-y-3">
            <!-- 付款方式-支付宝 -->
            <label id="payment-alipay" class="flex items-center gap-3 p-3 rounded-md bg-surface-container cursor-pointer border-2 border-primary transition-colors">
              <input type="radio" name="payment" value="alipay" checked class="accent-primary w-4 h-4" />
              <i data-lucide="wallet" class="w-5 h-5 text-[#1677FF]"></i>
              <span class="text-sm font-medium text-on-surface">支付宝</span>
            </label>
            <!-- 付款方式-微信支付 -->
            <label id="payment-wechat" class="flex items-center gap-3 p-3 rounded-md bg-surface-container cursor-pointer border-2 border-transparent hover:border-outline-variant/20 transition-colors">
              <input type="radio" name="payment" value="wechat" class="accent-primary w-4 h-4" />
              <i data-lucide="message-circle" class="w-5 h-5 text-[#07C160]"></i>
              <span class="text-sm font-medium text-on-surface">微信支付</span>
            </label>
            <!-- 付款方式-银行卡 -->
            <label id="payment-bank" class="flex items-center gap-3 p-3 rounded-md bg-surface-container cursor-pointer border-2 border-transparent hover:border-outline-variant/20 transition-colors">
              <input type="radio" name="payment" value="bank" class="accent-primary w-4 h-4" />
              <i data-lucide="landmark" class="w-5 h-5 text-on-surface-variant"></i>
              <span class="text-sm font-medium text-on-surface">银行卡</span>
            </label>
          </div>
        </section>

      </div>

      <!-- ========== 右栏：订单摘要 ========== -->
      <div>
        <div class="bg-surface rounded-lg shadow-card p-5 sticky top-[76px]">
          <h2 class="text-base font-semibold text-on-surface mb-4">订单摘要</h2>

          <!-- 已选商品列表 -->
          <div class="space-y-4 mb-5">
            <!-- 商品-1 -->
            <div class="flex gap-3">
              <img src="https://images.unsplash.com/photo-1555041469-a58638e7e388?w=200&h=200&fit=crop" alt="北欧风布艺沙发" data-category="服饰时尚" class="w-16 h-16 rounded-md object-cover bg-surface-container shrink-0" />
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-on-surface truncate">北欧风布艺沙发</p>
                <p class="text-xs text-on-surface-variant">米白色</p>
                <div class="flex items-center justify-between mt-1">
                  <span class="text-xs text-on-surface-variant">×1</span>
                  <span class="text-sm font-medium text-on-surface">¥4,580</span>
                </div>
              </div>
            </div>
            <!-- 商品-2 -->
            <div class="flex gap-3">
              <img src="https://images.unsplash.com/photo-1506439773649-6e0eb8cfb407?w=200&h=200&fit=crop" alt="意式真皮单人椅" data-category="服饰时尚" class="w-16 h-16 rounded-md object-cover bg-surface-container shrink-0" />
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-on-surface truncate">意式真皮单人椅</p>
                <p class="text-xs text-on-surface-variant">焦糖棕</p>
                <div class="flex items-center justify-between mt-1">
                  <span class="text-xs text-on-surface-variant">×2</span>
                  <span class="text-sm font-medium text-on-surface">¥5,760</span>
                </div>
              </div>
            </div>
            <!-- 商品-3 -->
            <div class="flex gap-3">
              <img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?w=200&h=200&fit=crop" alt="实木茶几" data-category="服饰时尚" class="w-16 h-16 rounded-md object-cover bg-surface-container shrink-0" />
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-on-surface truncate">实木茶几</p>
                <p class="text-xs text-on-surface-variant">胡桃木色</p>
                <div class="flex items-center justify-between mt-1">
                  <span class="text-xs text-on-surface-variant">×1</span>
                  <span class="text-sm font-medium text-on-surface">¥1,280</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 分隔线 -->
          <div class="border-t border-outline-variant/20 my-4"></div>

          <!-- 金额明细 -->
          <div class="space-y-2 mb-4">
            <div class="flex items-center justify-between">
              <span class="text-sm text-on-surface-variant">小计</span>
              <span id="subtotal-amount" class="text-sm text-on-surface">¥11,620</span>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm text-on-surface-variant">运费</span>
              <span id="shipping-fee" class="text-sm text-success">免费</span>
            </div>
          </div>

          <!-- 分隔线 -->
          <div class="border-t border-outline-variant/20 my-4"></div>

          <!-- 总计 -->
          <div class="flex items-center justify-between mb-5">
            <span class="text-base font-semibold text-on-surface">总计</span>
            <span id="total-amount" class="text-lg font-bold text-primary">¥11,620</span>
          </div>

          <!-- Place Order 按钮 -->
          <button id="btn-place-order" class="w-full bg-primary text-on-primary px-4 py-3 rounded-md text-sm font-medium hover:opacity-90 active:scale-[0.98] transition-all inline-flex items-center justify-center gap-2">
            <i data-lucide="check-circle" class="w-4 h-4"></i>
            Place Order
          </button>

          <!-- 返回购物车链接 -->
          <div class="text-center mt-4">
            <a id="link-back-cart" href="cart.html" class="text-sm text-on-surface-variant hover:text-primary transition-colors inline-flex items-center gap-1">
              <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
              返回购物车
            </a>
          </div>
        </div>
      </div>

    </div>

    <!-- @main-content:end -->
  </main>

  <script>
    $(function () {

      // === 配送方式切换 ===
      $('input[name="shipping"]').on('change', function () {
        var isExpress = $(this).val() === 'express';
        var feeText = isExpress ? '¥200' : '免费';
        var feeClass = isExpress ? 'text-sm text-on-surface' : 'text-sm text-success';

        // 更新运费显示
        $('#shipping-fee').attr('class', feeClass).text(feeText);

        // 更新总计
        var subtotal = 11620;
        var shipping = isExpress ? 200 : 0;
        var total = subtotal + shipping;
        $('#total-amount').text('¥' + total.toLocaleString());

        // 更新选中态边框
        $('input[name="shipping"]').each(function () {
          var $label = $(this).closest('label');
          if ($(this).is(':checked')) {
            $label.removeClass('border-transparent').addClass('border-primary');
          } else {
            $label.removeClass('border-primary').addClass('border-transparent');
          }
        });
      });

      // === 付款方式切换 ===
      $('input[name="payment"]').on('change', function () {
        $('input[name="payment"]').each(function () {
          var $label = $(this).closest('label');
          if ($(this).is(':checked')) {
            $label.removeClass('border-transparent').addClass('border-primary');
          } else {
            $label.removeClass('border-primary').addClass('border-transparent');
          }
        });
      });

      // === Place Order 按钮 ===
      $('#btn-place-order').on('click', function () {
        // 简单表单验证：检查必填项是否为空
        var name = $('#input-name').val().trim();
        var phone = $('#input-phone').val().trim();
        var address = $('#input-address').val().trim();

        if (!name || !phone || !address) {
          // 高亮空字段
          if (!name) $('#input-name').addClass('ring-2 ring-error/50');
          if (!phone) $('#input-phone').addClass('ring-2 ring-error/50');
          if (!address) $('#input-address').addClass('ring-2 ring-error/50');
          return;
        }

        // 跳转到订单确认页
        window.location.href = 'order-confirmed.html';
      });

      // === 输入框清除错误状态 ===
      $('#input-name, #input-phone, #input-address').on('input', function () {
        $(this).removeClass('ring-2 ring-error/50');
      });

    });
  </script>

  <script>lucide.createIcons();</script>
</body>

</html>
