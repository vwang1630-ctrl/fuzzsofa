<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 字体 -->
  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #E8B4B8;
      --color-primary-container:    #3D2A2E;
      --color-on-primary:           #0A0A0A;
      /* === 背景 / 表面 === */
      --color-background:                 #0A0A0A;
      --color-surface-container-lowest:   #0E0E0E;
      --color-surface:                    #111111;
      --color-surface-container:          #1A1A1A;
      --color-surface-container-high:     #1F1F1F;
      --color-surface-container-highest:  #252525;
      /* === 文字 === */
      --color-on-surface:           #F5F0EB;
      --color-on-surface-variant:   #8A8580;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #333333;
      --color-outline-variant:  #1A1A1A;
      /* === 圆角（最大8px，保持锐利几何感） === */
      --radius-sm:   0.125rem;
      --radius-md:   0.25rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.5rem;
      --radius-2xl:  0.5rem;
      --radius-full: 9999px;
      /* === 阴影（纯黑阴影） === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.3);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.4);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.5);
      /* === 字体 === */
      --font-sans: "Inter", system-ui, sans-serif;
      --font-serif: "Cormorant Garamond", Georgia, serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23111111"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%238A8580" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件 -->
  <header class="fixed top-0 left-0 right-0 z-40 h-[60px] flex items-center justify-between px-6 bg-background/80 backdrop-blur-[8px] border-b border-outline-variant/30">
    <div class="max-w-7xl w-full mx-auto flex items-center justify-between">
      <a href="magazine.html" class="font-serif text-xl tracking-[0.1em] text-on-surface">FUZZ SOFA</a>
      <nav class="flex items-center gap-8">
        <a href="magazine.html" class="text-sm tracking-[0.1em] text-primary uppercase" aria-current="page">Magazine</a>
        <a href="#" class="text-sm tracking-[0.1em] text-on-surface-variant uppercase hover:text-on-surface transition-colors">Collection</a>
        <a href="#" class="text-sm tracking-[0.1em] text-on-surface-variant uppercase hover:text-on-surface transition-colors">Scenes</a>
        <a href="#" class="text-sm tracking-[0.1em] text-on-surface-variant uppercase hover:text-on-surface transition-colors">Account</a>
      </nav>
    </div>
  </header>
  <!-- @nav:end 导航组件 -->

  <main class="max-w-7xl mx-auto pt-[60px]">
    <!-- @main-content:start -->
    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
